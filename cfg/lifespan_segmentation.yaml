system:
  project: PROJ
  exp_name: Lifespan_Segmentation
  n_threads: 8
  ckpt_dir: '/opt/localdata/data/usr-envs/ruiying/Code/foundation/MoE_foundation_v3/segmentation_finetune_checkpoints_final/PROJ/Lifespan_Segmentation/best_model.pth'
  seed: 0
  wandb: true
  save_nii: true
  no_html: false
  display_winsize: 128

train:
  lr: 1e-4
  batch_size: 1
  weight_decay: 0.01
  betas: (0.9, 0.999)
  niter: 200
  niter_decay: 200
  type: 'mpl'
  mask_ratio: 0.7
  warmup: 20
  test_time: False
  cls_num: 15
  local_mae_patch: 8
  global_mae_patch: 4
  print_freq: 50
  save_epoch_freq: 50
  patience: 50

data:
  val_data: '/opt/localdata/data/usr-envs/ruiying/Code/foundation/MoE_foundation_final/tissue_label/val_data'
  src_data: '/opt/localdata/data/usr-envs/ruiying/Code/foundation/MoE_foundation_final/tissue_label/src_data'
  tgt_data: '/opt/localdata/data/usr-envs/ruiying/Code/foundation/MoE_foundation_final/tissue_label/tgt_data'
  src_demographics: '/opt/localdata/data/usr-envs/ruiying/Code/foundation/MoE_foundation_final/tissue_label/src_data/demographics.csv'
  tgt_demographics: '/opt/localdata/data/usr-envs/ruiying/Code/foundation/MoE_foundation_final/tissue_label/tgt_data/demographics.csv'
  val_demographics: '/opt/localdata/data/usr-envs/ruiying/Code/foundation/MoE_foundation_final/tissue_label/val_data/demographics.csv'
  extension: '.nii.gz'
  normalize: True
  norm_perc: 99.5
  remove_bg: True
  aug: True
  aug_prob: 0.35
  patch_size: [96, 96, 96]

model:
  pretrain_model: '/opt/localdata/data/usr-envs/ruiying/Code/foundation/MoE_foundation_final/MAE_checkpoint/best_mae.pth'
  large_scale: True
  modalities: ['T1w', 'T2w', 'FA', 'MD']
  age_groups: ['fetal', 'neonatal', 'infant', 'child', 'adult', 'elderly']
  moe_type: 'hierarchical'
  embed_dim: 512
  depth: 5